# config/engine.yml
# Global engine settings
# Pipeline-level settings override these defaults

engine:
  batch_window_seconds: 30
  loop_sleep_seconds: 1
  project_id: local-dev-project
  environment: local              # local | production

pubsub:
  endpoint: http://localhost:8080
  ack_deadline_seconds: 60
  message_retention: 86400s

bigquery:
  endpoint: http://localhost:8080
  location: US
  datasets:
    raw_staging: raw_staging
    snapshots: snapshots
    marts: marts
    quarantine: quarantine

dbt:
  target: dev
  project_dir: ./dbt
  profiles_dir: ./dbt

state:
  schema_registry_dir: .schema_registry
  state_dir: ~/.ude/state

api:
  host: 0.0.0.0
  port: 8000

ui:
  host: 0.0.0.0
  port: 8501