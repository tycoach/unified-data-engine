global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ude_engine
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics

  - job_name: ude_pushgateway
    static_configs:
      - targets: ['pushgateway:9091']
    honor_labels: true
clear