          - name: currency
          - name: status
          - name: created_at
          - name: batch_id

      - name: products_staged
        columns:
          - name: product_id
          - name: sku
          - name: name
          - name: category
          - name: price
          - name: in_stock
          - name: updated_at
          - name: batch_id
